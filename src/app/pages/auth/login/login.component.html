<div class="login"><app-floating-configurator />
    <div class="relative flex items-center justify-center min-h-screen min-w-[100vw] overflow-hidden px-4 bg-pattern">

        <div
            class="flex w-full max-w-6xl bg-white dark:bg-surface-900 rounded-3xl overflow-hidden shadow-lg flex-col lg:flex-row">


            <!-- Left: Image Section with Background -->
            <div class="w-full lg:w-1/2 hidden lg:flex items-center justify-center relative overflow-hidden">
                <!-- Background Image -->
                <div class="absolute inset-0 bg-cover bg-center z-0"
                    style="background-image: url('../../../../assets/images/nick-pampoukidis-t-UV1rZqPuY-unsplash.jpg');">
                </div>

                <!-- Gradient Overlay -->
                <div class="absolute inset-0 bg-gradient-to-b from-primary/70 to-primary/50 z-10"></div>

                <!-- Foreground Content -->
                <div class="text-center text-white relative z-20 px-6">
                    <h2 class="text-4xl font-bold mb-4">Welcome to Star CAS!</h2>
                    <p class="text-lg font-medium">Please sign in to access your dashboard.</p>
                </div>
            </div>


            <!-- Right: Login Form Section -->
            <div class="w-full lg:w-1/2 flex flex-col items-center justify-center p-6 sm:p-12">
                <div class="w-full max-w-md">
                    <img src="../../../../assets/images/starcas-logo.png" alt="Login Illustration"
                        class="mb-6 rounded-lg w-full" style="background: white;padding: 0 4rem;" />
                    <!-- SelectButton Tab Switcher -->
                    <p-selectButton [options]="loginOptions" [(ngModel)]="selectedLogin" optionLabel="label"
                        class="mb-6 w-full" [unselectable]="false">
                    </p-selectButton>

                    <!-- Login Forms -->
                    <ng-container *ngIf="selectedLogin.value === 'user'">
                        <div class="text-center mb-6">
                            <h3 class="text-2xl font-semibold text-surface-900 dark:text-surface-0 mb-1">User Login</h3>
                            <p class="text-muted-color">Access your user dashboard</p>
                        </div>

                        <label for="userEmail" class="block font-medium mb-2">Email</label>
                        <input pInputText id="userEmail" type="text" placeholder="Email address" class="w-full mb-4"
                            [(ngModel)]="userEmail" />

                        <label for="userPassword" class="block font-medium mb-2">Password</label>
                        <p-password id="userPassword" [(ngModel)]="userPassword" placeholder="Password"
                            [toggleMask]="true" styleClass="mb-4" [fluid]="true" [feedback]="false"></p-password>

                        <div class="flex justify-between items-center mb-6">
                            <div class="flex items-center">
                                <p-checkbox [(ngModel)]="rememberUser" binary inputId="rememberUser"
                                    class="mr-2"></p-checkbox>
                                <label for="rememberUser">Remember me</label>
                            </div>
                            <a class="text-primary cursor-pointer font-medium">Forgot password?</a>
                        </div>

                        <p-button label="Sign In" styleClass="w-full" icon="pi pi-user"
                            (onClick)="onUserLogin()"></p-button>
                    </ng-container>

                    <ng-container *ngIf="selectedLogin.value === 'admin'">
                        <div class="text-center mb-6">
                            <h3 class="text-2xl font-semibold text-surface-900 dark:text-surface-0 mb-1">Admin Login
                            </h3>
                            <p class="text-muted-color">Secure access to admin panel</p>
                        </div>

                        <label for="adminEmail" class="block font-medium mb-2">Admin Email</label>
                        <input pInputText id="adminEmail" type="text" placeholder="Admin email" class="w-full mb-4"
                            [(ngModel)]="adminEmail" />

                        <label for="adminPassword" class="block font-medium mb-2">Password</label>
                        <p-password id="adminPassword" [(ngModel)]="adminPassword" placeholder="Password"
                            [toggleMask]="true" styleClass="mb-4" [fluid]="true" [feedback]="false"></p-password>

                        <div class="flex justify-between items-center mb-6">
                            <div class="flex items-center">
                                <p-checkbox [(ngModel)]="rememberAdmin" binary inputId="rememberAdmin"
                                    class="mr-2"></p-checkbox>
                                <label for="rememberAdmin">Remember me</label>
                            </div>
                            <a class="text-primary cursor-pointer font-medium">Forgot password?</a>
                        </div>

                        <p-button label="Admin Sign In" styleClass="w-full" icon="pi pi-lock"
                            (onClick)="onAdminLogin()"></p-button>
                    </ng-container>
                </div>
            </div>
        </div>
    </div>
</div>
