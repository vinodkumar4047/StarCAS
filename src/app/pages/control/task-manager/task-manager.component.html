<!-- Header Section with Background and Title -->
<div class="background-ban"
    style="display: flex; justify-content: flex-start; align-items: center; margin-bottom: 20px;">
    <h2 style="margin: 0;">Task Manager Details</h2>
</div>

<!-- Card and Table -->
<div class="card" style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;">
    <p-table [value]="customers" [paginator]="true" [rows]="10" [tableStyle]="{ 'min-width': '50rem' }"
        [rowsPerPageOptions]="[10,15,20]">
        <ng-template #header>
            <tr>
                <th style="width:25%">
                    TASK_NAME</th>
                <th style="width:25%">TASK_ID</th>
                <th style="width:25%">STATUS</th>
                <th style="width:25%">START_DATE</th>
                <th style="width:25%">START_TIME</th>
            </tr>
        </ng-template>
        <ng-template #body let-customer>
            <tr>
                <td>{{ customer.name }}</td>
                <td>{{ customer.taskId }}</td>
                <td>{{ customer.status }}</td>
                <td>{{ customer.startDate }}</td>
                <td>{{ customer.startTime }}</td>
            </tr>
        </ng-template>
    </p-table>
</div>
