<div class="atm-type-controller-chart p-8">
    <div style="text-align: center;margin-bottom: 20px;">
 <h2 class="mb-8 card header-card " style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;">Graph Details </h2>
    </div>

    <div class="card " style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;">
        <div class="flex gap-2 items-center mb-8 justify-between flex-wrap">
            <div *ngIf="tex" class="font-semibold text-xl heading-color">
                <span *ngIf="tex"> Approval : <span style="color: #198819">81.134%</span> &nbsp;&nbsp; Technical Decline : <span style="color: #eb3b3b;">18.866%</span> &nbsp;&nbsp; Bussiness Decline : <span style="color: #eb3b3b;">0.000%</span></span>
            </div>
            <div></div>
            <div class="flex gap-2">
                <p-button (click)="show()" icon="pi pi-align-center" />
                <p-button icon="pi pi-sync" />

            </div>
        </div>
        <div class="box" *ngIf="label1">
            <div class="grid grid-cols-1 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-5 gap-4">
                <div class="flex flex-col gap-2">
                    <label for="username">Branch</label>

                    <form [formGroup]="formGroup">
                        <p-select formControlName="selectedCity" [options]="cities" optionLabel="name"
                            placeholder="Select a City" />
                    </form>

                </div>
                <div class="flex flex-col gap-2">
                    <label for="username">Terminal</label>

                    <form [formGroup]="formGroup">
                        <p-select formControlName="selectedCity" [options]="cities" optionLabel="name"
                            placeholder="Select a City" />
                    </form>

                </div>
                <div class="flex flex-col gap-2">
                    <label for="username">From Date</label>
                    <p-datepicker [(ngModel)]="date2" [iconDisplay]="'input'" [showIcon]="true" inputId="icondisplay" />
                </div>
                <div class="flex flex-col gap-2">
                    <label for="username">To Date</label>
                    <p-datepicker [(ngModel)]="date2" [iconDisplay]="'input'" [showIcon]="true" inputId="icondisplay" />
                </div>
                <div class="flex justify-end items-end">
                    <p-button label="Filter" severity="info" icon="pi pi-filter" />
                </div>
            </div>
        </div>

        <div class=" body">
            <div class="Terminal_Wise">
                <div class="flex flex-wrap justify-between items-center relative p-4">
                    <h1>Terminal Wise</h1>
                    <p-splitbutton icon="pi pi-align-justify" class="btnrel" [model]="items" />
                </div>

                <div class="card ">
                    <p-chart class="trem" type="line" [data]="data" [options]="options" class="h-[30rem]" />
                </div>
            </div>

            <div class="TransTypeWise">
                <div class="flex flex-wrap justify-between items-center relative p-4">
                    <h1>Transaction Type Wise</h1>
                    <p-button icon="pi pi-align-justify" class="btnrel" />
                </div>
                <div class="card">
                    <p-chart type="bar" [data]="barChartData" [options]="barChartOptions" class="h-[30rem]"></p-chart>
                </div>

            </div>

            <div class="ResponseWise">
                <div class="flex flex-wrap justify-between items-center relative p-4">
                    <h1>Response Wise</h1>
                    <p-button icon="pi pi-align-justify" class="btnrel" />
                </div>
                <div class="card flex justify-center">
                    <p-chart type="pie" [data]="pieChartData" [options]="pieChartOptions"
                        class="w-full md:w-[30rem]"></p-chart>
                </div>


            </div>

            <div class="TransactionStatus">
                <div class="flex flex-wrap justify-between items-center relative p-4">
                    <h1>TransactionS tatus</h1>
                    <p-button icon="pi pi-align-justify" class="btnrel" />
                </div>

                <div class="card">
                    <p-chart type="line" [data]="lineChartData" [options]="lineChartOptions"
                        class="h-[30rem]"></p-chart>
                </div>


            </div>

        </div>

    </div>
</div>
