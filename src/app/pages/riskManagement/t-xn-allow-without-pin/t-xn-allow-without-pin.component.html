<div class="" style="display: flex; justify-content: flex-start; align-items: center; margin-bottom: 20px;">
    <h2 style="margin: 0;"> TXN ALLOWED FOR OFFLINE PIN </h2>
</div>

<div class="card" style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;">
    <app-table [tableData]="rawData" [cols]="cols" [globalFilterFields]="globalFilterFields" (addEvent)="edit($event)"
        (addEvent)="addOrEdit('Add',$event)" (editEvent)="addOrEdit('Edit',$event)"
        (deleteEvent)="delete_visible = true" (viewEvent)="addOrEdit('View',$event)" [addButton]="' Add Offline Pin'" />
</div>
<p-dialog [modal]="true" [(visible)]="delete_visible" [closable]="false" [style]="{ width: '25rem' }">
    <ng-template pTemplate="header">
        <div class="flex justify-between items-center w-full">
            <span class="text-lg font-semibold custom-text-color">
                Confirm Deletion
            </span>
            <button pButton icon="pi pi-times" severity="secondary" class="change p-button-sm"
                (click)="delete_visible = false"></button>
        </div>
    </ng-template>
    <div class="p-text-secondary mb-4 font-bold text-lg tracking-wide">
        Are you sure you want to delete?
    </div>
    <div class=" mb-4 text-base tracking-wide"> * This action cannot be undone.</div>
    <div class="flex justify-end gap-2">
        <p-button label="No" severity="secondary" (click)="delete_visible = false" />
        <p-button label="Yes, Delete" severity="danger" (click)="delateData()" />
    </div>
</p-dialog>
<div class="AddtxnDetails">
    <div class="card flex justify-center">
        <!-- <p-button (click)="showDialog()" label="Show" /> -->
        <p-dialog header="Edit Profile" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
            <span class="p-text-secondary block mb-8">Update your information.</span>
            <div class="flex items-center gap-4 mb-4">
                <label for="username" class="font-semibold w-24">Username</label>
                <input pInputText id="username" class="flex-auto" autocomplete="off" />
            </div>
            <div class="flex items-center gap-4 mb-8">
                <label for="email" class="font-semibold w-24">Email</label>
                <input pInputText id="email" class="flex-auto" autocomplete="off" />
            </div>
            <div class="flex justify-end gap-2">
                <p-button label="Cancel" severity="secondary" (click)="visible = false" />
                <p-button label="Save" (click)="visible = false" />
            </div>
        </p-dialog>
    </div>

</div>
