<div class="atmDetails">
    <h2 class="mb-8 card header-card " style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;"> BIN Details </h2>

    <div class="card" style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;">
        <app-table [tableData]="customers" [cols]="cols" [globalFilterFields]="globalFilterFields"
            (viewEvent)="showFucntion($event)" />
    </div>
</div>
<!-- Card and Table -->
<div class="card" style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;">
    <!-- SHOW POPUP  -->
    <p-dialog [modal]="true" [(visible)]="show_visible" [style]="{ width: '50rem' }" [closable]="false"
        class="BIN_SHOW_DIALOG">

        <!-- ✔.Custom header template -->
        <ng-template pTemplate="header">
            <div class="flex justify-between items-center w-full">
                <span class="text-lg font-semibold custom-text-color">TXN Details</span>
                <button pButton type="button" icon="pi pi-times" class="change hovBut p-button-sm" 
                    tooltipPosition="top" (click)="show_visible = false">
                </button>
            </div>
        </ng-template>
        <div class="card">
            <p-table [value]="products" stripedRows>
                <ng-template #header>
                    <tr>
                        <th style="border-color: #234e94; font-weight: 900;">Txn Code</th>
                        <th style="border-color: #234e94; font-weight: 900;">Txn Description</th>
                    </tr>
                </ng-template>
                <ng-template #body let-product>
                    <tr>
                        <td>{{product.TXNCODE}}</td>
                        <td>{{product.TXNDESC}}</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </p-dialog>
</div>
