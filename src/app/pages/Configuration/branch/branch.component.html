<div class="branchDetails">
    <h2 class="mb-8 card header-card " style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;"> Branch Details </h2>

    <div class="card" style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;">
        <!-- <app-table [tableData]="customers" [cols]="cols" [globalFilterFields]="globalFilterFields" [multipleButton]=""
            (deleteEvent)="delete_visible = true" (addEvent)="addOrEdit()" (editEvent)="editFunction($event, 'edit')"
            (viewEvent)="editFunction($event , 'view')" [addButton]="userRole != 'maker'?null:'Add ATM'"  
            [multipleButton]="userRole != 'maker'?buttonsList:''" (event)="authFunc($event)"/> -->
   <app-table
  [tableData]="customers"
  [cols]="cols"
  [globalFilterFields]="globalFilterFields"
  (deleteEvent)="delete_visible = true"
  (addEvent)="addOrEdit()"
  (editEvent)="editFunction($event, 'edit')"
  (viewEvent)="editFunction($event , 'view')"
  [addButton]="userRole != 'maker' || !canAddBranch ? null : 'Add ATM'"
  [multipleButton]="userRole != 'maker' ? filteredButtons : ''"
  (event)="authFunc($event)">
</app-table>
    </div>


    <p-dialog [(visible)]="edit_visible" [modal]="true" [style]="{ width: '50rem' }" [closable]="false"
        class="EDIT_BRANCH_DIALOG">
        <ng-template pTemplate="header">
            <div class="flex justify-between items-center w-full">
                <span class="text-lg font-semibold custom-text-color">
                    {{tpCheck == true ? 'View Your Details':'Edit Your Details'}}
                </span>
                <button pButton icon="pi pi-times" class="change hovBut p-button-sm"
                    (click)="edit_visible = false"></button>
            </div>
        </ng-template>

        <!-- Table-like layout  -->
        <div *ngIf="Edit_data">
            <div class="table-row">
                <div class="table-cell heading">INST ID</div>
                <input class="table-cell value" pInputText [(ngModel)]="Edit_data.INSTID" type="text" placeholder=""
                    [disabled]="true" />
            </div>
            <div class="table-row">
                <div class="table-cell heading">Branch Id</div>
                <input class="table-cell value" pInputText [(ngModel)]="Edit_data.BRANCHCODE" type="text" placeholder=""
                    [disabled]="true" />

            </div>
            <div class="table-row">
                <div class="table-cell heading">Branch Map Code</div>
                <input class="table-cell value" pInputText [(ngModel)]="Edit_data.BRANCHMAPCODE" type="text"
                    placeholder="" [disabled]="tpCheck" />

            </div>
            <div class="table-row">
                <div class="table-cell heading">Branch Name</div>
                <input class="table-cell value" pInputText [(ngModel)]="Edit_data.BRANCHNAME" type="text" placeholder=""
                    [disabled]="tpCheck" />

            </div>
        </div>
        <div class="flex justify-end gap-2 mt-4" *ngIf="!tpCheck">
            <p-button label="Cancel" severity="secondary" (click)="edit_visible = false" />
            <p-button label="Save" icon="pi pi-save" (click)="edit_visible = false" />
        </div>
    </p-dialog>

    <p-dialog [modal]="true" [(visible)]="delete_visible" [closable]="false" [style]="{ width: '25rem' }">
        <ng-template pTemplate="header">
            <div class="flex justify-between items-center w-full">
                <span class="text-lg font-semibold custom-text-color">
                    Confirm Deletion
                </span>
                <button pButton icon="pi pi-times" class="change hovBut p-button-sm"
                    (click)="delete_visible = false"></button>
            </div>
        </ng-template>
        <div class="p-text-secondary mb-4">
            Are you sure you want to delete this item? This action cannot be undone.
        </div>
        <div class="flex justify-end gap-2">
            <p-button label="No" severity="secondary" (click)="delete_visible = false" />
            <p-button label="Yes, Delete" severity="danger" (click)="delete_visible = false" />
        </div>
    </p-dialog>



    <!-- ADD POPUP -->
    <p-dialog [modal]="true" [(visible)]="ADDvisible" [style]="{ width: '50rem' }" [closable]="false"
        class="EDIT_BRANCH_DIALOG">
        <ng-template pTemplate="header">
            <div class="flex justify-between items-center w-full">
                <span class="text-lg font-semibold custom-text-color">
                    Branch Profile Configuration
                </span>
                <button pButton icon="pi pi-times" class="change hovBut p-button-sm"
                    (click)="ADDvisible = false"></button>
            </div>
        </ng-template>

        <div class="grid grid-cols-2 gap-4 mt-6">
            <div class="flex flex-col gap-2">
                <label for="username">Institution Id *</label>
                <input pInputText id="TEST" aria-describedby="username-help" [disabled]="true" placeholder="TEST" />
            </div>
            <div class="flex flex-col gap-2">
                <label for="username">Branch Code *</label>
                <input pInputText id="username" aria-describedby="username-help" placeholder="Branch Code" />
            </div>
            <div class="flex flex-col gap-2">
                <label for="username">Branch Map Code *</label>
                <input pInputText id="username" aria-describedby="username-help" placeholder="Branch Map Code" />
            </div>
            <div class="flex flex-col gap-2">
                <label for="username">Branch Name*</label>
                <input pInputText id="username" aria-describedby="username-help" placeholder="Branch Name" />
            </div>
        </div>

        <div class="flex justify-end gap-2 mt-4">
            <p-button label="Cancel" severity="secondary" (click)="ADDvisible = false" />
            <p-button label="Save" (click)="ADDvisible = false" />
        </div>
    </p-dialog>
</div>
