<!-- Header Section with Background and Title -->
<div class="" style="display: flex; justify-content: flex-start; align-items: center; margin-bottom: 20px;">
    <h2 style="margin: 0;">Branch Details</h2>
</div>

<!-- Card and Table -->
<div class="card" style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;">
    <p-table [value]="customers" [paginator]="true" [rows]="10" [tableStyle]="{ 'min-width': '50rem' }"
        [rowsPerPageOptions]="[10,15,20]">
        <ng-template #caption>
            <div class="flex w-full align-items-center gap-2 justify-content-between ">
                <p-button label="Add" [outlined]="true" icon="pi pi-plus" />
                <p-iconfield iconPosition="left" class="ml-auto">
                    <p-inputicon>
                        <i class="pi pi-search"></i>
                    </p-inputicon>
                    <input pInputText type="text" class="searchInp mr-1" placeholder="Search keyword" />
                    <button pButton type="button" icon="pi pi-search" class="change p-button-sm mr-2" pTooltip="Search"
                        tooltipPosition="top"></button>
                    <button pButton type="button" icon="pi pi-times" class="change p-button-sm" pTooltip="Clear"
                        tooltipPosition="top"></button>

                </p-iconfield>

                <!-- <p-button label="Clear" [outlined]="true" icon="pi pi-filter-slash" /> -->

            </div>
        </ng-template>
        <ng-template #header>
            <tr>
                <th>
                    INST ID</th>
                <th>BRANCH ID</th>
                <th>BRANCH MAP CODE</th>
                <th>BRANCH NAME</th>
                <th>Actions</th>


            </tr>
        </ng-template>
        <ng-template #body let-customer>
            <tr>
                <td>{{ customer.INSTID }}</td>
                <td>{{ customer.INSTNAME }}</td>
                <td>{{ customer.INSTROUTETYPE }}</td>
                <td>{{ customer.INSTTYPE }}</td>
                <span class="flex gap-2">
                    <button pButton type="button" icon="pi pi-eye" class="change p-button-icon-only" pTooltip="View"
                        tooltipPosition="top" (click)="addFunction()"></button>
                    <button pButton type="button" icon="pi pi-file-edit" class="change p-button-icon-only"
                        pTooltip="Edit" tooltipPosition="top"></button>
                    <button pButton type="button" icon="pi pi-trash" class="change p-button-icon-only" pTooltip="Delete"
                        tooltipPosition="top"></button>
                </span>
                <!-- ADD POPUP -->
                <p-dialog contentStyleClass="custom-dialog-content" [modal]="true" [(visible)]="visible"
                    [style]="{ width: '50rem' }" [closable]="false">

                    <!-- Custom header template -->
                    <ng-template pTemplate="header">
                        <div class="flex justify-between items-center w-full">
                            <span class="text-lg font-semibold">Branch Details</span>
                            <button pButton type="button" icon="pi pi-times" class="change p-button-sm" pTooltip="Clear"
                                tooltipPosition="top" (click)="visible = false">
                            </button>
                        </div>
                    </ng-template>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col gap-2">
                            <label for="username">Institution Id *</label>
                            <input pInputText id="TEST" aria-describedby="username-help" [disabled]="true"
                                placeholder="TEST" />
                        </div>
                        <div class="flex flex-col gap-2">
                            <label for="username">Branch Code *</label>
                            <input pInputText id="username" aria-describedby="username-help"
                                placeholder="Branch Code" />
                        </div>
                        <div class="flex flex-col gap-2">
                            <label for="username">Branch Map Code *</label>
                            <input pInputText id="username" aria-describedby="username-help"
                                placeholder="Branch Map Code" />
                        </div>
                        <div class="flex flex-col gap-2">
                            <label for="username">Branch Name*</label>
                            <input pInputText id="username" aria-describedby="username-help"
                                placeholder="Branch Name" />
                        </div>
                    </div>

                    <div class="flex justify-end gap-2 mt-4">
                        <p-button class="dialog-close-button" label="Close" severity="secondary"
                            (click)="visible = false" />
                    </div>
                </p-dialog>

            </tr>
        </ng-template>


    </p-table>
</div>
