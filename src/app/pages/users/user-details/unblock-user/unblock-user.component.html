<div class="unblock-user-controller col-span-12 xl:col-span-12">
    <h2 class="mb-8 card header-card " style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;">User Details</h2>
    <div class="card !mb-4">
        <div class="flex justify-between">
            <div class="flex gap-2 items-center mb-8">
                <p-button icon="pi pi-arrow-left" (onClick)="goBack()" styleClass="p-button-text"
                    class="backIcon"></p-button>
                <div class="font-semibold text-xl heading-color">
                   Blocked Users
                </div>
            </div>
        </div>
        <div>
             <app-table [tableData]="tableData" [cols]="cols" [globalFilterFields]="globalFilterFields" (event)="blockButton($event)" />
        </div>
    </div>
</div>
