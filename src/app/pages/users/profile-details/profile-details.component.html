<div class="atmDetails">
    <h2 class="mb-8">ATM Details</h2>

    <div class="card" style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;">
        <app-table [tableData]="atmData" [cols]="cols" [globalFilterFields]="globalFilterFields" [multipleButton]=""
            (deleteEvent)="delete_visible = true" (addEvent)="addOrEdit($event,'add')"
            (editEvent)="addOrEdit($event,'edit')" (viewEvent)="addOrEdit($event,'view')" [addButton]="'Add Profile'" />
    </div>
</div>
