<div class="edit-password col-span-12 xl:col-span-12">
  <!-- <h2 class="mb-8 card header-card "
    style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px;">Change Password</h2> -->

  <div class="card mb-4 ">
    <form [formGroup]="PasswordForm" (ngSubmit)="onSubmit()" class="max-w-6xl mx-auto p-6 bg-white shadow-md rounded-lg w-full">
  <!-- Header -->
  <div class="my-8 border-b pb-4">
    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
      <i class="pi pi-lock text-blue-600 text-xl"></i>
      Change Password
    </h2>
    <p class="text-sm text-gray-500 mt-1">Update your account password securely.</p>
  </div>

  <div class="flex flex-col lg:flex-row gap-8">
    <!-- Password Rules -->
    <div class="lg:w-1/2 bg-blue-50 border border-blue-200 rounded-md p-5 shadow-sm">
      <div class="flex items-center mb-3 text-blue-700 font-semibold text-lg">
        <i class="pi pi-info-circle mr-2"></i>
        Password Requirements
      </div>
      <ul class="list-disc list-inside text-blue-700 text-sm space-y-1 ml-1">
        <li *ngFor="let msg of passwordRules">{{ msg }}</li>
      </ul>
    </div>

    <!-- Form Fields -->
    <div class="lg:w-1/2 flex flex-col gap-6">
      <!-- Current Password -->
      <p-floatlabel variant="on" class="w-full">
        <p-password
          id="CurrentPassword"
          formControlName="CurrentPassword"
          [toggleMask]="true"
          [feedback]="false"
          class="w-full"
        ></p-password>
        <label for="CurrentPassword">
          Current Password <span class="text-red-500">*</span>
        </label>
      </p-floatlabel>

      <!-- New Password -->
      <p-floatlabel variant="on" class="w-full">
        <p-password
          id="NewPassword"
          formControlName="NewPassword"
          [toggleMask]="true"
           [feedback]="false"
          class="w-full"
        ></p-password>
        <label for="NewPassword">
          New Password <span class="text-red-500">*</span>
        </label>
      </p-floatlabel>

      <!-- Inline error -->
      <div *ngIf="PasswordForm.get('NewPassword')?.touched || PasswordForm.get('NewPassword')?.dirty">
        <div *ngIf="getFirstPasswordError()" class="text-red-500 text-sm mt-1">
          {{ getFirstPasswordError() }}
        </div>
      </div>

      <!-- Confirm Password -->
      <p-floatlabel variant="on" class="w-full">
        <p-password
          id="ConfirmPassword"
          formControlName="ConfirmPassword"
          [toggleMask]="true"
           [feedback]="false"
          class="w-full"
        ></p-password>
        <label for="ConfirmPassword">
          Confirm Password <span class="text-red-500">*</span>
        </label>
      </p-floatlabel>
    </div>
  </div>

  <!-- Submit Button -->
  <div class="flex justify-end mt-10 gap-4"> 
    <p-button
      label="Cancel"
      severity="secondary"
      raised
      styleClass="px-6 py-2 font-medium text-sm"
      (click)="goBack()"
    />
    <p-button
      label="Update Password"
      severity="primary"
      raised
      icon="pi pi-save"
      type="submit"
      styleClass="px-6 py-2 font-medium text-sm"
    />
    
  </div>
</form>

  </div>
</div>
